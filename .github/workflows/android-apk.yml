name: Build Android APK

# Roda manualmente: aba "Actions" → "Build Android APK" → "Run workflow".
#
# Agora o APK é OFFLINE-CAPABLE: o app inteiro (public/) + o mesh-core são
# EMBARCADOS nos assets, e o Capacitor NÃO usa server.url — abre dos assets
# locais (funciona sem internet). A URL informada vira a BASE de API absoluta
# (window.SPEEDVOX_SERVER) usada só quando há internet para login/chat/chamadas.
on:
  workflow_dispatch:
    inputs:
      server_url:
        description: 'URL HTTPS do servidor SpeedVox (base de API quando online)'
        required: true
        default: 'https://chat.vibetube.com.br'
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor deps
        working-directory: mobile
        run: npm install

      - name: Bundle full web app + mesh-core into Capacitor www
        run: |
          rm -rf mobile/www
          mkdir -p mobile/www
          cp -r public/. mobile/www/
          mkdir -p mobile/www/mesh-core
          cp -r packages/mesh-core/src/. mobile/www/mesh-core/
          # Vendor the Socket.IO browser client so the bundled app has `io`
          # locally (the server's /socket.io/socket.io.js isn't reachable offline).
          npm install socket.io-client@^4.8.3 --no-save --no-audit --no-fund
          mkdir -p mobile/www/socket.io
          cp node_modules/socket.io-client/dist/socket.io.min.js mobile/www/socket.io/socket.io.js
          echo "Conteúdo de mobile/www:"; ls -la mobile/www

      - name: Inject API base (window.SPEEDVOX_SERVER) into bundled index.html
        env:
          SERVER_URL: ${{ inputs.server_url }}
        run: |
          node -e "const fs=require('fs');const f='mobile/www/index.html';let h=fs.readFileSync(f,'utf8');const tag='<script>window.SPEEDVOX_SERVER=\"'+process.env.SERVER_URL+'\";</script>';h=h.includes('</head>')?h.replace('</head>',tag+'\n</head>'):tag+h;fs.writeFileSync(f,h);console.log('window.SPEEDVOX_SERVER =>',process.env.SERVER_URL)"

      - name: Sync Android project
        working-directory: mobile
        run: npx cap sync android

      - name: Build debug APK
        working-directory: mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp mobile/android/app/build/outputs/apk/debug/app-debug.apk speedvox-${{ github.run_number }}.apk

      - name: Inspect APK (evidence report)
        run: |
          APK=speedvox-${{ github.run_number }}.apk
          echo "================ RELATÓRIO DE EVIDÊNCIAS DO APK ================"
          echo "## Tamanho:"; ls -lh $APK | awk '{print $5, $9}'
          echo
          echo "## capacitor.config.json embarcado:"; unzip -p $APK assets/capacitor.config.json || true
          echo
          echo "## server.url presente? (esperado: NENHUM = app abre offline)"
          if unzip -p $APK assets/capacitor.config.json | grep -q '"url"'; then echo "❌ ACHOU server.url"; else echo "✅ OK: sem server.url (assets locais)"; fi
          echo
          echo "## index.html embarcado é o app real? (procura a tela de login)"
          N=$(unzip -p $APK assets/public/index.html | grep -c 'auth-screen' || true); echo "ocorrências de 'auth-screen': $N"
          echo
          echo "## App e mesh-core embarcados?"
          unzip -l $APK | grep -E 'assets/public/js/app.js' && echo "✅ app.js embarcado" || echo "❌ app.js faltando"
          unzip -l $APK | grep -E 'assets/public/js/env.js' && echo "✅ env.js embarcado" || echo "❌ env.js faltando"
          unzip -l $APK | grep -E 'assets/public/mesh-core/index.js' && echo "✅ mesh-core embarcado" || echo "❌ mesh-core faltando"
          echo
          echo "## Plugin nativo SpeedvoxNearby presente no dex?"
          FOUND=0
          for d in $(unzip -Z1 $APK | grep -E '^classes.*\.dex$'); do
            if unzip -p $APK "$d" | strings | grep -Eq 'SpeedvoxNearby|P2P_CLUSTER|app.speedvox.mesh'; then
              FOUND=1
              unzip -p $APK "$d" | strings | grep -Eo 'SpeedvoxNearby[A-Za-z]*|P2P_CLUSTER|app.speedvox.mesh' | sort -u | sed 's/^/   /'
            fi
          done
          [ $FOUND -eq 1 ] && echo "✅ OK: plugin Nearby compilado no APK" || echo "❌ plugin não encontrado no dex"
          echo
          echo "## Permissões de Bluetooth/Wi-Fi no APK:"
          unzip -p $APK AndroidManifest.xml | strings | grep -iE 'BLUETOOTH|NEARBY_WIFI|WIFI_STATE|ACCESS_FINE_LOCATION' | sort -u | sed 's/^/   /' || echo "   (nenhuma encontrada)"
          echo
          echo "## Lib do Nearby (play-services) embarcada?"
          unzip -l $APK | grep -i 'nearby' | head | sed 's/^/   /' || echo "   (não listada por nome)"
          echo "==============================================================="

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: speedvox-apk
          path: speedvox-${{ github.run_number }}.apk

      - name: Publish Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: SpeedVox APK (build ${{ github.run_number }})
          body: |
            APK OFFLINE-CAPABLE do SpeedVox (build ${{ github.run_number }}).

            - App inteiro + mesh-core EMBARCADOS (abre sem internet).
            - Sem server.url: assets carregam localmente.
            - Base de API quando online: `${{ inputs.server_url }}`.
            - Plugin nativo Nearby (Bluetooth/Wi-Fi Direct) incluído.

            Veja o passo "Inspect APK (evidence report)" do run para a prova do
            conteúdo do pacote. Instale permitindo "fontes desconhecidas".
          files: speedvox-${{ github.run_number }}.apk
