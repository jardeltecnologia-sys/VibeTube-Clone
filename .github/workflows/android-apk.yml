name: Build Android APK

# Roda manualmente: aba "Actions" → "Build Android APK" → "Run workflow".
# Informe a URL HTTPS pública do seu servidor SpeedVox; o APK gerado abrirá esse
# servidor. Baixe o APK no fim do run (Artifacts) ou na Release criada.
on:
  workflow_dispatch:
    inputs:
      server_url:
        description: 'URL HTTPS do seu servidor SpeedVox (ex.: https://speedvox.onrender.com)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor deps
        working-directory: mobile
        run: npm install

      - name: Inject server URL into Capacitor config
        working-directory: mobile
        env:
          SERVER_URL: ${{ inputs.server_url }}
        run: |
          node -e "const fs=require('fs');const f='capacitor.config.json';const c=JSON.parse(fs.readFileSync(f));c.server.url=process.env.SERVER_URL;fs.writeFileSync(f,JSON.stringify(c,null,2));console.log('server.url =>',c.server.url)"

      - name: Sync Android project
        working-directory: mobile
        run: npx cap sync android

      - name: Build debug APK
        working-directory: mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp mobile/android/app/build/outputs/apk/debug/app-debug.apk speedvox-${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: speedvox-apk
          path: speedvox-${{ github.run_number }}.apk

      - name: Publish Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: SpeedVox APK (build ${{ github.run_number }})
          body: |
            APK de teste do SpeedVox apontando para `${{ inputs.server_url }}`.
            Instale no Android (permita "instalar de fontes desconhecidas") e
            compartilhe este link com seus amigos para testarem juntos.
          files: speedvox-${{ github.run_number }}.apk
