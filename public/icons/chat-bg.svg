    <rect x="150" y="150" width="60" height="44" rx="8"/><circle cx="180" cy="172" r="12"/>
    <path d="M166 150l6-8h16l6 8"/>
    <!-- star -->
    <path d="M70 250l8 18 20 2-15 14 4 20-17-10-17 10 4-20-15-14 20-2z"/>
    <!-- envelope -->
    <rect x="150" y="252" width="60" height="40" rx="6"/><path d="M150 256l30 20 30-20"/>
    <!-- wifi / mesh arcs -->
    <path d="M286 268a30 30 0 0 1 52 0"/><path d="M296 280a16 16 0 0 1 32 0"/><circle cx="312" cy="290" r="3"/>
    <!-- paper plane -->
    <path d="M250 332l40-16-40-16 6 16z"/>
    <!-- chat bubble small -->
    <path d="M40 320h36a8 8 0 0 1 8 8v14a8 8 0 0 1-8 8H56l-12 9v-9a8 8 0 0 1-8-8v-14"/>
  </g>
</svg>
