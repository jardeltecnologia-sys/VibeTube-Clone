    <!-- musical note -->
    <path d="M160 40v44"/><circle cx="152" cy="86" r="8"/>
    <path d="M160 40l20-6v40"/><circle cx="172" cy="76" r="8"/>
    <!-- smiley -->
    <circle cx="312" cy="150" r="24"/><circle cx="304" cy="144" r="2"/><circle cx="320" cy="144" r="2"/>
    <path d="M302 158a14 10 0 0 0 20 0"/>
    <!-- phone handset -->
    <path d="M44 156c0 36 28 64 64 64l10-14-18-12-10 8c-12-6-22-16-28-28l8-10-12-18z"/>
