# Deploy to Fly.io (https://fly.io) — automatic HTTPS, with a persistent volume.
#
#   fly launch --no-deploy        # creates the app (keep this fly.toml)
#   fly volumes create speedvox_data --size 1
#   fly secrets set JWT_SECRET="$(openssl rand -hex 32)"
#   fly deploy
#
app = "speedvox"
primary_region = "gru"   # São Paulo; change as needed

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.checks]
    [[http_service.checks.http]]
      path = "/api/health"
      interval = "30s"
      timeout = "5s"

# Persist the SQLite DB / uploads / VAPID keys across deploys.
[mounts]
  source = "speedvox_data"
  destination = "/app/data"
