# Self-hosting on a VPS with automatic HTTPS (Let's Encrypt via Caddy).
#
# ⚠️  PRODUÇÃO (chat.vibetube.com.br): NÃO use este arquivo. Ela roda atrás do
#     nginx (não Caddy), com o app em 127.0.0.1:3017. Use docker-compose.prod.yml
#     e o guia deploy/PROD-DEPLOY.md. O conteúdo abaixo é só o exemplo Caddy.
#
#   1. Point a DNS A record (e.g. chat.seudominio.com) to the server's IP.
#   2. Set env vars and run:
#        DOMAIN=chat.seudominio.com JWT_SECRET="$(openssl rand -hex 32)" \
#        PUBLIC_URL=https://chat.seudominio.com docker compose up -d --build
#   Caddy obtains and renews TLS certificates automatically.

services:
  app:
    build: .
    container_name: speedvox-app-1
    env_file:
      - .env
    environment:
      - PORT=3000
      - NODE_ENV=production
    ports:
      - "127.0.0.1:3017:3000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  speedvox-data:
  speedvox-uploads:
  caddy-data:
  caddy-config:
